name: smartscan_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.1
  share_plus: 12.0.2
  path_provider: ^2.1.5
  archive: ^3.6.1
  pdf: ^3.12.0
  file_picker: 11.0.2
  csv: ^8.0.0
  excel: ^4.0.6
  provider: ^6.1.5+1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  file_saver: ^0.3.1
  qr: ^3.0.2
  url_launcher: ^6.3.2
  async_zip: ^0.1.0
  http: ^1.2.0
  package_info_plus: ^8.0.0
  ota_update: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
