name: Build Android Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Determine environment
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build Shorebird Release (APK)
        run: shorebird release android --artifact apk
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Rename APK
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/SmartScan.apk
          elif [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
            mv build/app/outputs/apk/release/app-release.apk build/app/outputs/apk/release/SmartScan.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartScan
          path: |
            build/app/outputs/flutter-apk/SmartScan.apk
            build/app/outputs/apk/release/SmartScan.apk

      - name: Get Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ env.VERSION }}
          files: |
            build/app/outputs/flutter-apk/SmartScan.apk
            build/app/outputs/apk/release/SmartScan.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
